<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상상우리 에듀 플로우 프로 V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        
        /* 껌뻑거림 (Blinking) 애니메이션 - 조치대기 상태용 */
        @keyframes urgentBlink {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); transform: scale(1); }
            50% { box-shadow: 0 0 10px 4px rgba(249, 115, 22, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); transform: scale(1); }
        }
        .task-blink {
            animation: urgentBlink 1.5s infinite;
            border: 2px solid #f97316 !important;
            background-color: #fff7ed !important;
            color: #c2410c !important;
            z-index: 10;
        }
        .calendar-cell::-webkit-scrollbar { width: 4px; }
        .calendar-cell::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-gray-800">

    <!-- 사이드바: 교육 과정 개설 -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col h-full shadow-sm flex-shrink-0 z-20">
        <div class="p-5 border-b border-gray-200 flex items-center space-x-3 bg-blue-700">
            <h1 class="text-xl font-bold text-white tracking-wide"><i class="fas fa-layer-group mr-2"></i>Edu Flow V5</h1>
        </div>
        <div class="p-5 flex-1 overflow-y-auto">
            <h2 class="text-sm font-bold text-gray-700 mb-4">신규 과정 개설</h2>
            <form id="courseForm" class="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                <input type="text" id="courseName" required placeholder="과정명 (예: 시니어 AI 강사)" class="w-full border p-2 text-sm rounded outline-none focus:ring-2 focus:ring-blue-500">
                
                <select id="courseRegion" required class="w-full border p-2 text-sm rounded outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="서울">서울</option>
                    <option value="부산">부산</option>
                    <option value="광주">광주</option>
                    <option value="전주">전주</option>
                    <option value="대구">대구</option>
                </select>
                
                <!-- 파트너 UI 반영: 담당 강사명 입력 폼 추가 -->
                <input type="text" id="courseInstructor" placeholder="담당 강사명 (예: 홍길동 강사)" class="w-full border p-2 text-sm rounded outline-none focus:ring-2 focus:ring-blue-500">
                
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">교육 시작일 (D-Day)</label>
                    <input type="date" id="courseStartDate" required class="w-full border p-2 text-sm rounded outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow transition">일정 생성</button>
            </form>
            <div class="mt-6">
                <h2 class="text-sm font-bold text-gray-700 mb-3">운영 중인 과정</h2>
                <ul id="courseList" class="space-y-2"></ul>
            </div>
        </div>
    </aside>

    <!-- 메인: 한 달 달력 뷰 -->
    <main class="flex-1 flex flex-col h-full bg-white relative">
        <header class="p-5 border-b border-gray-200 flex justify-between items-center z-10 shadow-sm bg-white">
            <div class="flex items-center space-x-4">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full transition"><i class="fas fa-chevron-left text-gray-600"></i></button>
                <h2 class="text-2xl font-black text-gray-800 w-48 text-center" id="calendarTitle">2026년 6월</h2>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full transition"><i class="fas fa-chevron-right text-gray-600"></i></button>
                <button onclick="resetToToday()" class="ml-4 px-3 py-1.5 bg-gray-100 font-bold text-sm text-gray-600 rounded hover:bg-gray-200 transition">오늘</button>
            </div>
            <div class="flex items-center text-sm font-bold text-gray-500 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200">
                <i class="fas fa-satellite-dish mr-2 text-blue-500 animate-pulse"></i>Dify / Notion 동기화 대기중
            </div>
        </header>

        <!-- 캘린더 그리드 -->
        <div class="flex-1 flex flex-col p-6 bg-slate-50 overflow-hidden">
            <div class="grid grid-cols-7 gap-4 mb-2 text-center text-sm font-bold">
                <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
            </div>
            <div id="calendarGrid" class="flex-1 grid grid-cols-7 grid-rows-6 gap-2 pb-4"></div>
        </div>
    </main>

    <!-- 업무 제어 모달창 (4단계 상태, 날짜 변경, 강사 정보) -->
    <div id="taskModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform transition-all">
            <div class="p-5 border-b border-gray-200 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-gray-800" id="modalTaskName">업무명</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <span class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded font-bold mr-1" id="modalRegion">지역</span>
                        <span class="text-sm font-bold text-gray-700" id="modalCourseName">과정명</span>
                    </div>
                    <div class="text-sm font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-200" id="modalDDayBadge">D-??</div>
                </div>
                
                <!-- 파트너 UI 반영: 강사 정보 디스플레이 -->
                <div class="mb-6 bg-blue-50 border border-blue-100 p-3 rounded-lg flex items-center">
                    <i class="fas fa-chalkboard-teacher text-blue-500 text-lg mr-3"></i>
                    <div>
                        <p class="text-xs text-blue-600 font-bold mb-0.5">담당 강사</p>
                        <p class="text-sm font-semibold text-gray-800" id="modalInstructorName">강사 정보 없음</p>
                    </div>
                </div>

                <!-- 최종 실행일 변경 영역 -->
                <div class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label class="block text-sm font-bold text-gray-700 mb-2">최종 실행일 (수정 가능)</label>
                    <div class="flex space-x-2">
                        <input type="date" id="modalTargetDate" class="flex-1 border border-gray-300 p-2 rounded outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        <button onclick="updateTargetDate()" class="bg-gray-800 text-white px-4 py-2 rounded font-bold hover:bg-gray-900 transition text-sm">날짜 변경</button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle mr-1"></i>날짜를 변경하면 캘린더의 위치와 실시간 D-Day가 재계산됩니다.</p>
                </div>

                <!-- 4단계 진행 상태 버튼 영역 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-3">업무 진행 상태 변경 (Notion 연동)</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="updateStatus('계획반영')" id="btnStatus_계획반영" class="py-2.5 rounded-lg border font-bold text-sm transition focus:outline-none">
                            <i class="fas fa-clipboard-list mr-1"></i>계획반영
                        </button>
                        <button onclick="updateStatus('조치대기')" id="btnStatus_조치대기" class="py-2.5 rounded-lg border font-bold text-sm transition focus:outline-none">
                            <i class="fas fa-exclamation-circle mr-1"></i>조치대기
                        </button>
                        <button onclick="updateStatus('조치완료')" id="btnStatus_조치완료" class="py-2.5 rounded-lg border font-bold text-sm transition focus:outline-none">
                            <i class="fas fa-paper-plane mr-1"></i>조치완료
                        </button>
                        <button onclick="updateStatus('실행')" id="btnStatus_실행" class="py-2.5 rounded-lg border font-bold text-sm transition focus:outline-none">
                            <i class="fas fa-check-double mr-1"></i>실행 (종결)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 기본 설정 및 데이터 로드 ---
        // Dify API 설정
        const DIFY_API_URL = "https://api.dify.ai/v1/workflows/run"; 
        const DIFY_API_KEY = "app-BcgWq2s4KjoXgeHM6okgnaHw";

        const dDayRules = [
            { d: 60, task: "커리큘럼 확정 및 대관" }, { d: 40, task: "홍보물 제작 및 강사의뢰" },
            { d: 30, task: "홍보 및 모집 진행" }, { d: 14, task: "교안 취합" },
            { d: 10, task: "교안 제작" }, { d: 7, task: "선발 인터뷰" }, { d: 6, task: "합격자 발표" }
        ];

        // V5 전용 스토리지 사용
        let courses = JSON.parse(localStorage.getItem('eduCourses_sangsang_v5')) || [];
        let currentDate = new Date();
        let today = new Date();
        today.setHours(0,0,0,0);
        let activeTaskInfo = null;

        // --- 2. 캘린더 및 업무 렌더링 ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('calendarTitle').innerText = `${currentDate.getFullYear()}년 ${currentDate.getMonth() + 1}월`;

            // 순차적 업무 추출 (실행 상태가 아닌 첫 업무까지만 노출)
            let visibleTasks = [];
            courses.forEach(course => {
                let sorted = [...course.tasks].sort((a,b) => new Date(a.targetDate) - new Date(b.targetDate));
                let foundNext = false;
                sorted.forEach(task => {
                    if (task.status === '실행') {
                        visibleTasks.push({...task, courseName: course.name, region: course.region, instructorName: course.instructorName});
                    } else if (!foundNext) {
                        visibleTasks.push({...task, courseName: course.name, region: course.region, instructorName: course.instructorName});
                        foundNext = true; 
                    }
                });
            });

            let startDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            startDate.setDate(startDate.getDate() - startDate.getDay()); 

            for (let i = 0; i < 42; i++) {
                const cellDate = new Date(startDate);
                cellDate.setDate(cellDate.getDate() + i);
                
                const cell = document.createElement('div');
                let cellClass = "bg-white border border-gray-200 rounded-lg p-2 flex flex-col shadow-sm calendar-cell overflow-y-auto relative ";
                if (cellDate.getMonth() !== currentDate.getMonth()) cellClass += "bg-gray-50 opacity-60 ";
                if (cellDate.getTime() === today.getTime()) cellClass += "border-blue-400 ring-2 ring-blue-100 ";
                cell.className = cellClass;

                cell.innerHTML = `<div class="text-right text-sm font-bold mb-1 ${cellDate.getTime() === today.getTime() ? 'text-blue-600' : 'text-gray-500'}">${cellDate.getDate()}</div>`;

                visibleTasks.filter(t => new Date(t.targetDate).setHours(0,0,0,0) === cellDate.getTime()).forEach(task => {
                    const diffDays = calculateDDay(task.targetDate);
                    const dDayText = diffDays === 0 ? 'D-Day' : (diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`);
                    
                    const taskEl = document.createElement('div');
                    taskEl.onclick = () => openModal(task);
                    taskEl.className = "cursor-pointer rounded p-1 mb-1 text-xs font-bold truncate transition shadow-sm ";
                    
                    if (task.status === '실행') {
                        taskEl.className += "bg-green-50 text-green-700 border border-green-200 line-through opacity-70";
                        taskEl.innerHTML = `[${task.region}] ${task.taskName}`;
                    } else if (task.status === '조치완료') {
                        taskEl.className += "bg-blue-50 text-blue-700 border border-blue-200";
                        taskEl.innerHTML = `[${task.region}] ${task.taskName} <span class="text-[10px] ml-1">(${dDayText})</span>`;
                    } else if (task.status === '조치대기') {
                        taskEl.className += "task-blink"; 
                        taskEl.innerHTML = `<i class="fas fa-exclamation-triangle mr-1"></i>[${task.region}] ${task.taskName} <span class="text-[10px] ml-1">(${dDayText})</span>`;
                    } else {
                        taskEl.className += "bg-gray-100 text-gray-700 border border-gray-200";
                        taskEl.innerHTML = `[${task.region}] ${task.taskName} <span class="text-[10px] ml-1">(${dDayText})</span>`;
                    }
                    cell.appendChild(taskEl);
                });
                grid.appendChild(cell);
            }
            renderCourseList();
        }

        function calculateDDay(targetDateStr) {
            const target = new Date(targetDateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        }

        // --- 3. 모달 및 상태 제어 로직 ---
        function openModal(task) {
            activeTaskInfo = task;
            const diffDays = calculateDDay(task.targetDate);
            
            document.getElementById('modalTaskName').innerText = task.taskName;
            document.getElementById('modalCourseName').innerText = task.courseName;
            document.getElementById('modalRegion').innerText = task.region;
            
            // 강사명 표시
            document.getElementById('modalInstructorName').innerText = task.instructorName || '지정되지 않음';
            
            const badge = document.getElementById('modalDDayBadge');
            badge.innerText = diffDays === 0 ? 'D-Day' : (diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)} (지연)`);
            badge.className = diffDays <= 3 && task.status !== '실행' ? "text-sm font-black text-red-600 bg-red-50 px-3 py-1 rounded-full border border-red-200 animate-pulse" : "text-sm font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-200";

            document.getElementById('modalTargetDate').value = task.targetDate.split('T')[0];

            const states = ['계획반영', '조치대기', '조치완료', '실행'];
            states.forEach(state => {
                const btn = document.getElementById(`btnStatus_${state}`);
                btn.className = "py-2.5 rounded-lg border font-bold text-sm transition focus:outline-none bg-white text-gray-500 border-gray-200 hover:bg-gray-50";
            });

            const activeBtn = document.getElementById(`btnStatus_${task.status}`);
            if(task.status === '계획반영') activeBtn.className = "py-2.5 rounded-lg border font-bold text-sm transition bg-gray-200 text-gray-800 border-gray-400 shadow-inner";
            if(task.status === '조치대기') activeBtn.className = "py-2.5 rounded-lg border font-bold text-sm transition bg-orange-100 text-orange-700 border-orange-400 shadow-inner ring-2 ring-orange-200";
            if(task.status === '조치완료') activeBtn.className = "py-2.5 rounded-lg border font-bold text-sm transition bg-blue-100 text-blue-700 border-blue-400 shadow-inner";
            if(task.status === '실행') activeBtn.className = "py-2.5 rounded-lg border font-bold text-sm transition bg-green-100 text-green-700 border-green-400 shadow-inner";

            document.getElementById('taskModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        function updateTargetDate() {
            if(!activeTaskInfo) return;
            const newDate = document.getElementById('modalTargetDate').value;
            if(!newDate) return;

            const course = courses.find(c => c.id === activeTaskInfo.courseId);
            const task = course.tasks.find(t => t.id === activeTaskInfo.id);
            task.targetDate = new Date(newDate).toISOString();
            
            localStorage.setItem('eduCourses_sangsang_v5', JSON.stringify(courses));
            alert('최종 실행일이 수정되어 캘린더에 반영되었습니다.');
            openModal({...activeTaskInfo, targetDate: task.targetDate}); 
            renderCalendar();
        }

        async function updateStatus(newStatus) {
            if(!activeTaskInfo) return;
            
            const course = courses.find(c => c.id === activeTaskInfo.courseId);
            const task = course.tasks.find(t => t.id === activeTaskInfo.id);
            task.status = newStatus;
            
            localStorage.setItem('eduCourses_sangsang_v5', JSON.stringify(courses));

            const payload = {
                inputs: {
                    course_name: course.name,
                    region: course.region,
                    instructor_name: course.instructorName || "미지정",
                    completed_task: task.taskName,
                    target_date: task.targetDate.split('T')[0],
                    task_status: newStatus
                },
                response_mode: "blocking",
                user: "manager_1"
            };

        // --- Dify 연동 시작 (이전 /* 삭제 위치) ---
            try {
                await fetch(DIFY_API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${DIFY_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("Dify API Error"); }
            
        // --- Dify 연동 끝 (이전 */ 삭제 위치) ---
            closeModal();
            renderCalendar();
        }

        // --- 4. 과정 개설 폼 제어 (강사명 추가) ---
        document.getElementById('courseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const courseId = Date.now().toString();
            const startDateStr = document.getElementById('courseStartDate').value;
            const instructorName = document.getElementById('courseInstructor').value;
            
            const tasks = dDayRules.map(rule => {
                const date = new Date(startDateStr);
                date.setDate(date.getDate() - rule.d);
                return { 
                    id: `${courseId}_${rule.d}`, 
                    courseId, 
                    taskName: rule.task, 
                    targetDate: date.toISOString(), 
                    status: '계획반영' 
                };
            });
            courses.push({ 
                id: courseId, 
                name: document.getElementById('courseName').value, 
                region: document.getElementById('courseRegion').value, 
                instructorName: instructorName,
                startDate: startDateStr, 
                tasks 
            });
            localStorage.setItem('eduCourses_sangsang_v5', JSON.stringify(courses));
            this.reset();
            
            currentDate = new Date(startDateStr);
            currentDate.setMonth(currentDate.getMonth() - 2); 
            renderCalendar();
        });

        function changeMonth(offset) { currentDate.setMonth(currentDate.getMonth() + offset); renderCalendar(); }
        function resetToToday() { currentDate = new Date(); renderCalendar(); }
        
        function renderCourseList() {
            document.getElementById('courseList').innerHTML = courses.map(c => 
                `<li class="text-sm bg-white p-2.5 border border-gray-200 rounded-lg shadow-sm flex justify-between items-center group">
                    <div class="truncate"><span class="font-bold text-blue-600 mr-1">[${c.region}]</span><span class="font-bold text-gray-700">${c.name}</span></div>
                    <button onclick="deleteCourse('${c.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash-alt"></i></button>
                </li>`
            ).join('');
        }

        function deleteCourse(id) {
            if(confirm("이 과정의 모든 일정을 삭제하시겠습니까?")) {
                courses = courses.filter(c => c.id !== id);
                localStorage.setItem('eduCourses_sangsang_v5', JSON.stringify(courses));
                renderCalendar();
            }
        }

        renderCalendar();
    </script>
</body>
</html>
